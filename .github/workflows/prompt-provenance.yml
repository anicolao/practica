name: Prompt Provenance

on:
  pull_request:

jobs:
  prompt-provenance:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check prompt provenance
        run: python3 scripts/check_prompt_provenance.py --mode diff --base-ref "${{ github.base_ref }}"
